name: fitchecker
description: FitChecker - Style it. Fit it. Own it. A fashion fit-checking app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.3.0
  google_fonts: ^6.1.0
  image_picker: ^1.0.7
  http: ^1.2.0
  flutter_dotenv: ^5.1.0
  cached_network_image: ^3.3.1
  provider: ^6.1.1
  mime: ^1.0.5
  path: ^1.8.3
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
